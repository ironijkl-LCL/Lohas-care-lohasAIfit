<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>野生 AR 小食獵人 - 數碼捕捉器升級版</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; -webkit-user-select: none; }
        .a-enter-vr, .a-enter-ar { display: none !important; }

        /* 頂層遊戲 HUD */
        #game-hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .header {
            background: linear-gradient(to bottom, rgba(15, 32, 67, 0.9), rgba(0,0,0,0)); 
            color: #00FFFF; padding: 20px 15px; text-align: center;
        }
        .header h1 { margin: 0; font-size: 22px; tracking: 2px; text-shadow: 0 0 10px #00FFFF; }
        .header p { margin: 6px 0 0 0; color: #FFF; font-size: 13px; }
        
        .footer {
            background: linear-gradient(to top, rgba(15, 32, 67, 0.9), rgba(0,0,0,0)); 
            padding: 30px 25px; text-align: center; color: white;
        }
        #score { font-size: 16px; font-weight: bold; color: #00FF66; text-shadow: 0 0 5px #00FF66; }
        
        /* 🔥 型格科幻 3D 風格捕捉按鈕 */
        #catch-btn {
            background: linear-gradient(135deg, #FF0055 0%, #9900AA 100%);
            color: white; border: 2px solid #00FFFF; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 35px; cursor: pointer;
            pointer-events: auto; display: inline-block; margin-top: 15px;
            box-shadow: 0 0 15px #FF0055, inset 0 0 10px rgba(255,255,255,0.5);
            letter-spacing: 1px; transition: all 0.2s ease;
        }
        #catch-btn:active { transform: scale(0.92); box-shadow: 0 0 5px #FF0055; }
    </style>
</head>
<body>

    <div id="game-hud">
        <div class="header">
            <h1>🛸 SNACK HUNTER: CYBER AR</h1>
            <p id="radar-text">📡 數碼雷達運作中... 轉動手機鎖定野生小食！</p>
        </div>
        
        <div class="footer">
            <div id="score">🎒 數碼背包：魚肉燒賣 [ <span id="num-siumai">0</span> ] | 雞蛋仔 [ <span id="num-egg">0</span> ]</div>
            <button id="catch-btn">⚡ 啟動數碼捕捉 ⚡</button>
        </div>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;' cursor="rayOrigin: mouse" raycaster="objects: .wild-snack">
        
        <a-entity id="camera-rig">
            <a-camera id="my-camera" look-controls="pointerLockEnabled: false">
                
                <a-entity id="cyber-catcher" position="0 0 -1" raycaster="objects: .wild-snack">
                    
                    <a-ring id="ring-outer" radius-inner="0.04" radius-outer="0.05" color="#00FFFF" segments-txt="32"
                            animation="property: rotation; to: 0 0 360; dur: 3000; loop: true; easing: linear">
                    </a-ring>
                    
                    <a-ring id="ring-inner" radius-inner="0.002" radius-outer="0.015" color="#00FFFF"
                            animation="property: scale; to: 1.2 1.2 1.2; dur: 800; dir: alternate; loop: true; easing: easeInOutSine">
                        <a-box width="0.03" height="0.002" depth="0.001" color="#00FFFF"></a-box>
                        <a-box width="0.002" height="0.03" depth="0.001" color="#00FFFF"></a-box>
                    </a-ring>
                    
                    <a-cursor id="hidden-cursor" visible="false"></a-cursor>

                </a-entity>
                
            </a-camera>
        </a-entity>

        <a-entity id="snack-container"></a-entity>

    </scene>

    <script>
        let siumaiCount = 0;
        let eggCount = 0;
        let currentTarget = null;

        const container = document.getElementById('snack-container');
        const radarText = document.getElementById('radar-text');
        const catchBtn = document.getElementById('catch-btn');
        
        // 獲取捕捉器 3D 組件用於更換外觀
        const ringOuter = document.getElementById('ring-outer');
        const ringInner = document.getElementById('ring-inner');

        // 【隨機修補生成野生小食】
        function spawnRandomSnack() {
            const type = Math.random() > 0.5 ? 'siumai' : 'egg';
            const id = 'snack-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
            
            // 360度隨機方位
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.2 + Math.random() * 2; // 距離 2.2 - 4.2 米
            const x = Math.sin(angle) * radius;
            const z = Math.cos(angle) * radius;
            const y = 0.3 + Math.random() * 1.3;     // 高低落差

            let snackEntity = document.createElement('a-entity');
            snackEntity.setAttribute('id', id);
            snackEntity.setAttribute('class', 'wild-snack');
            snackEntity.setAttribute('position', `${x} ${y} ${z}`);
            snackEntity.setAttribute('data-type', type);
            
            // 特效：等小食自帶微弱自轉旋轉，增加浮空「野生精靈感」
            snackEntity.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear');

            if (type === 'siumai') {
                snackEntity.innerHTML = `
                    <a-cylinder radius="0.006" height="0.4" color="#DEB887" rotation="10 0 15"></a-cylinder>
                    <a-cylinder radius="0.05" height="0.07" position="-0.02 0.1 0" color="#FFD700"></a-cylinder>
                    <a-cylinder radius="0.05" height="0.07" position="0 0 0" color="#FFD700"></a-cylinder>
                    <a-cylinder radius="0.05" height="0.07" position="0.02 -0.1 0" color="#FFD700"></a-cylinder>
                `;
            } else {
                snackEntity.innerHTML = `
                    <a-box width="0.35" height="0.42" depth="0.06" color="#E59866"></a-box>
                    <a-sphere radius="0.035" position="-0.06 0.16 0.04" color="#F39C12"></a-sphere>
                    <a-sphere radius="0.035" position="0.06 0.16 0.04" color="#F39C12"></a-sphere>
                    <a-sphere radius="0.035" position="0 0.20 0.04" color="#D35400"></a-sphere>
                `;
            }

            // 🔥 【動態反饋】：當高科技捕捉器對準呢個小食
            snackEntity.addEventListener('mouseenter', function () {
                currentTarget = this;
                radarText.innerText = `⚠️ TARGET LOCKED: 野生【${type === 'siumai' ? '魚肉燒賣' : '炭燒雞蛋仔'}】!!`;
                radarText.style.color = "#FF0055";
                
                // 變色：捕捉器變成危險警告紅色，並急速收縮
                ringOuter.setAttribute('color', '#FF0055');
                ringInner.setAttribute('color', '#FF0055');
                ringInner.setAttribute('scale', '0.6 0.6 0.6');
            });
            
            // 當捕捉器移開
            snackEntity.addEventListener('mouseleave', function () {
                if (currentTarget === this) currentTarget = null;
                radarText.innerText = "📡 雷達：四圍旋轉搜尋，小食正隱藏於虛擬經緯度中...";
                radarText.style.color = "#FFF";
                
                // 恢復：變回溫和的科幻螢光藍，恢復呼吸放大狀態
                ringOuter.setAttribute('color', '#00FFFF');
                ringInner.setAttribute('color', '#00FFFF');
                ringInner.setAttribute('scale', '1 1 1');
            });

            // 觸控點擊同樣可捕捉
            snackEntity.addEventListener('click', function() {
                doCapture(this);
            });

            container.appendChild(snackEntity);
        }

        // 【執行數碼捕捉】
        function doCapture(el) {
            if (!el) return;
            const type = el.getAttribute('data-type');
            
            // 炫酷捕捉動畫：先旋轉再瞬間縮小吸走
            el.setAttribute('animation', 'property: rotation; to: 0 1080 0; dur: 300; easing: easeOutQuad');
            el.setAttribute('animation__scale', 'property: scale; to: 0 0 0; dur: 300; easing: easeInBack');
            
            setTimeout(() => {
                if (type === 'siumai') {
                    siumaiCount++;
                    document.getElementById('num-siumai').innerText = siumaiCount;
                } else {
                    eggCount++;
                    document.getElementById('num-egg').innerText = eggCount;
                }
                
                if(el.parentNode) el.parentNode.removeChild(el);
                currentTarget = null;
                
                // 重置捕捉器外觀
                ringOuter.setAttribute('color', '#00FFFF');
                ringInner.setAttribute('color', '#00FFFF');
                ringInner.setAttribute('scale', '1 1 1');
                radarText.innerText = "⚡ SYSTEM: 成功將分子解構並收入背包！補貨中...";
                radarText.style.color = "#00FF66";

                // 在其他隨機未知方位重新修補生成新小食
                setTimeout(spawnRandomSnack, 800);

            }, 300);
        }

        // 點擊大按鈕
        catchBtn.addEventListener('click', () => {
            if (currentTarget) {
                doCapture(currentTarget);
            } else {
                alert("未鎖定目標！請揸緊手機轉身，用畫面中間嘅【旋轉科技鎖定儀】對準小食！");
            }
        });

        // 開局自動修補生成 5 個隨機方位小食
        window.addEventListener('load', () => {
            for(let i = 0; i < 5; i++) {
                spawnRandomSnack();
            }
        });
    </script>
</body>
</html>
