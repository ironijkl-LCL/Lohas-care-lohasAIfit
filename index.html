<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Nutrition Ultimate++</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #0a0a0f;
    color: white;
    padding-bottom: 110px;
}
.card {
    margin: 16px;
    padding: 20px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
}
.search-container {
    display: flex;
    gap: 10px;
    margin: 16px;
}
.search-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 14px;
    color: white;
}
.search-btn {
    padding: 0 20px;
    border-radius: 16px;
    background: linear-gradient(90deg, #ff9f0a, #ff375f);
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.rings {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #ff9f0a;
}
.macro-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    text-align: center;
    margin-top: 15px;
}
.macro-box {
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 14px;
}
.sub-macro-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
}
.sub-macro-box {
    background: rgba(255,255,255,0.015);
    padding: 8px 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    border: 1px solid rgba(255,255,255,0.03);
}
.sub-macro-box span:last-child {
    color: #aeaea3;
}
.micronutrient-title {
    font-size: 14px;
    color: #ff375f;
    margin: 16px 0 8px 0;
    font-weight: bold;
    text-align: left;
}
.micro-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    font-size: 11px;
    text-align: center;
}
.micro-box {
    background: rgba(255,255,255,0.02);
    padding: 6px 4px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.02);
}
.micro-val {
    color: #30d158;
    font-weight: bold;
    margin-top: 2px;
}
.iddsi-badge {
    background: #5856d6;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    display: inline-block;
}
.chart-svg { width: 100%; height: 65px; overflow: visible; }
.history-item {
    background: rgba(255,255,255,0.02);
    padding: 12px;
    border-radius: 14px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>
<body>

<div class="search-container">
    <input type="text" class="search-input" id="foodSearchInput" placeholder="輸入食物名稱 (例如: 絲襪奶茶)">
    <button class="search-btn" onclick="searchFoodText()">🔍 搜尋</button>
</div>

<div id="result" style="font-size: 13px; color: #ff9f0a; margin: 0 16px;"></div>

<div class="card" style="text-align: center;">
    <h3>🔥 今日熱量與營養總和</h3>
    <div class="rings">
        <div>
            <div id="cal" style="font-size: 24px; font-weight: bold;">0</div>
            <div style="font-size: 10px; color: #8e8e93;">KCAL</div>
        </div>
    </div>
    
    <div class="macro-grid">
        <div class="macro-box"><div>🥩 蛋白質</div><div id="protein" style="font-weight: bold; color: #ff9f0a;">0g</div></div>
        <div class="macro-box"><div>🍞 碳水</div><div id="carbs" style="font-weight: bold; color: #ffcc00;">0g</div></div>
        <div class="macro-box"><div>🧈 脂肪</div><div id="fat" style="font-weight: bold; color: #4cd964;">0g</div></div>
    </div>

    <div class="sub-macro-grid">
        <div class="sub-macro-box"><span>⚖️ 累計克數</span><span id="grams">0g</span></div>
        <div class="sub-macro-box"><span>🍬 糖分</span><span id="sugar">0g</span></div>
        <div class="sub-macro-box"><span>🔒 飽和脂肪</span><span id="satFat">0g</span></div>
        <div class="sub-macro-box"><span>⚠️ 反式脂肪</span><span id="transFat">0g</span></div>
        <div class="sub-macro-box"><span>🍳 膽固醇</span><span id="cholesterol">0mg</span></div>
        <div class="sub-macro-box"><span>🌿 膳食纖維</span><span id="fiber">0g</span></div>
        <div class="sub-macro-box" style="grid-column: span 2; display: flex; justify-content: space-between; align-items: center;">
            <span>🥣 IDDSI 安全等級</span>
            <div id="iddsiMain"><span class="iddsi-badge">--</span></div>
        </div>
    </div>

    <div class="micronutrient-title">🧬 今日微量元素累計</div>
    <div class="micro-grid">
        <div class="micro-box"><div>🦴 鈣</div><div class="micro-val" id="micro_ca">0mg</div></div>
        <div class="micro-box"><div>⚓ 鐵</div><div class="micro-val" id="micro_fe">0mg</div></div>
        <div class="micro-box"><div>🧪 鎂</div><div class="micro-val" id="micro_mg">0mg</div></div>
        <div class="micro-box"><div>🧂 鈉</div><div class="micro-val" id="micro_na">0mg</div></div>
        <div class="micro-box"><div>🍌 鉀</div><div class="micro-val" id="micro_k">0mg</div></div>
        <div class="micro-box"><div>🛡️ 鋅</div><div class="micro-val" id="micro_zn">0mg</div></div>
        <div class="micro-box"><div>🍊 維他命C</div><div class="micro-val" id="micro_vitc">0mg</div></div>
    </div>
</div>

<div class="card">
    <h3>📈 本週卡路里動態趨勢</h3>
    <svg class="chart-svg" viewBox="0 0 300 60">
        <path id="chartPathLine" d="M 10 50 L 290 50" fill="none" stroke="#ff9f0a" stroke-width="3"/>
        <g id="chartGridX"></g>
    </svg>
</div>

<div class="card">
    <h3>📜 今日餐食記錄</h3>
    <div id="history">尚無數據</div>
</div>

<script>
// 🎯 請在此處替換為你的 Apps Script 正式網址
const API_URL = "https://script.google.com/macros/s/AKfycbyUUlD_-S7d22LnTjoFDtHSWkuwkTWFJsyjmLgoJKuX-6HXJSc2ECFO1p037E1qaTvX/exec";

let cal = 0, grams = 0, protein = 0, carbs = 0, fat = 0;
let satFat = 0, transFat = 0, cholesterol = 0, sugar = 0, fiber = 0;
let micro_ca = 0, micro_fe = 0, micro_mg = 0, micro_na = 0, micro_k = 0, micro_zn = 0, micro_vitc = 0;

let weeklyData = [1400, 1500, 1350, 1600, 0];

function parseValue(val) {
    if (val === undefined || val === null || val === '') return 0;
    let num = parseFloat(val.toString().replace(/[^\d.-]/g, ''));
    return isNaN(num) ? 0 : num;
}

function formatOutput(num) {
    return Number(num.toFixed(2)).toString();
}

async function searchFoodText() {
    const query = document.getElementById("foodSearchInput").value.trim();
    if (!query) return;
    
    document.getElementById("result").innerHTML = "⏳ 正在搜尋雲端試算表資料庫...";
    
    try {
        let res = await fetch(API_URL);
        if (res.ok) {
            let resData = await res.json();
            let foodList = resData.nutrition_data || [];
            
            // 模糊搜尋食物名稱
            let targetItem = foodList.find(item => {
                let dbName = (item["foodname"] || "").toString().toLowerCase();
                return dbName.includes(query.toLowerCase());
            });
            
            if (targetItem) {
                document.getElementById("result").innerHTML = "<span style='color:#30d158;'>✅ 成功抓取試算表數據！</span>";
                
                // 1. 大宗數據累加
                let fCal = Math.round(parseValue(targetItem["calories"]));
                cal += fCal;
                grams += parseValue(targetItem["grams"]);
                protein += parseValue(targetItem["protein"]);
                carbs += parseValue(targetItem["carbs"]);
                fat += parseValue(targetItem["fat"]);

                // 2. 進階細項與微量元素累加
                fiber += parseValue(targetItem["dietaryfiber"]);
                sugar += parseValue(targetItem["sugar"]);
                satFat += parseValue(targetItem["saturatedfat"]);
                transFat += parseValue(targetItem["transfat"]);
                cholesterol += parseValue(targetItem["cholesterol"]);
                
                micro_ca += parseValue(targetItem["calcium"]);
                micro_fe += parseValue(targetItem["iron"]);
                micro_mg += parseValue(targetItem["magnesium"]);
                micro_na += parseValue(targetItem["sodium"]);
                micro_k += parseValue(targetItem["potassium"]);
                micro_zn += parseValue(targetItem["zinc"]);
                micro_vitc += parseValue(targetItem["vitaminc"]);

                // 3. 讀取 IDDSI
                let iddsiVal = targetItem["iddsi"] || "--";

                // ----- 刷新前端 UI -----
                document.getElementById("cal").innerText = cal;
                document.getElementById("grams").innerText = formatOutput(grams) + "g";
                document.getElementById("protein").innerText = formatOutput(protein) + "g";
                document.getElementById("carbs").innerText = formatOutput(carbs) + "g";
                document.getElementById("fat").innerText = formatOutput(fat) + "g";
                
                document.getElementById("sugar").innerText = formatOutput(sugar) + "g";
                document.getElementById("satFat").innerText = formatOutput(satFat) + "g";
                document.getElementById("transFat").innerText = formatOutput(transFat) + "g";
                document.getElementById("cholesterol").innerText = formatOutput(cholesterol) + "mg";
                document.getElementById("fiber").innerText = formatOutput(fiber) + "g";
                document.getElementById("iddsiMain").innerHTML = `<span class="iddsi-badge">${iddsiVal}</span>`;
                
                document.getElementById("micro_ca").innerText = formatOutput(micro_ca) + "mg";
                document.getElementById("micro_fe").innerText = formatOutput(micro_fe) + "mg";
                document.getElementById("micro_mg").innerText = formatOutput(micro_mg) + "mg";
                document.getElementById("micro_na").innerText = formatOutput(micro_na) + "mg";
                document.getElementById("micro_k").innerText = formatOutput(micro_k) + "mg";
                document.getElementById("micro_zn").innerText = formatOutput(micro_zn) + "mg";
                document.getElementById("micro_vitc").innerText = formatOutput(micro_vitc) + "mg";
                
                // 歷史餐食紀錄
                let displayFoodName = targetItem["foodname"] || "未知食物";
                let histBox = document.getElementById("history");
                if (histBox.innerText === "尚無數據") histBox.innerHTML = "";
                histBox.innerHTML += `
                    <div class="history-item">
                        <div>
                            <div style="font-weight:bold;">${displayFoodName} (${formatOutput(parseValue(targetItem["grams"]))}g)</div>
                            <div style="font-size:11px; color:#aaa; margin-top:2px;">IDDSI: ${iddsiVal}</div>
                        </div>
                        <span style="color:#ff9f0a; font-weight:bold;">+${fCal} KCAL</span>
                    </div>`;
                
                weeklyData[weeklyData.length - 1] = cal;
                drawChart();
                
                document.getElementById("foodSearchInput").value = "";
            } else {
                document.getElementById("result").innerHTML = "";
                alert("在試算表中找不到包含「" + query + "」的食物，請檢查拼字！");
            }
        } else {
            alert("後端伺服器回應異常，請確認 Apps Script 已成功發布為 Anyone 權限。");
        }
    } catch (err) {
        alert("搜尋失敗，錯誤原因: " + err.toString());
    }
}

function drawChart() {
    let stepX = 260 / (weeklyData.length - 1);
    let pts = [];
    let txt = "";
    
    weeklyData.forEach((val, idx) => {
        let x = 20 + idx * stepX;
        let y = 50 - (val / 2500 * 40);
        pts.push(`${x},${y}`);
        txt += `<text x="${x}" y="58" fill="#8e8e93" font-size="8" text-anchor="middle">${20+idx}/6</text>`;
    });
    document.getElementById("chartPathLine").setAttribute("d", "M " + pts.join(" L "));
    document.getElementById("chartGridX").innerHTML = txt;
}

window.onload = function() {
    drawChart();
};
</script>
</body>
</html>
