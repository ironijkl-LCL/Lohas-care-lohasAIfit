<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Nutrition Ultimate++</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #0a0a0f;
    color: white;
    padding-bottom: 110px;
}
.card {
    margin: 16px;
    padding: 20px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
}
.search-container {
    display: flex;
    gap: 10px;
    margin: 16px;
}
.search-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 14px;
    color: white;
}
.search-btn {
    padding: 0 20px;
    border-radius: 16px;
    background: linear-gradient(90deg, #ff9f0a, #ff375f);
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.rings {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #ff9f0a;
}
.macro-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    text-align: center;
    margin-top: 15px;
}
.micro-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    text-align: center;
    margin-top: 15px;
}
.macro-box {
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 14px;
}
.micro-box {
    background: rgba(255,255,255,0.02);
    padding: 8px 4px;
    border-radius: 10px;
    font-size: 11px;
}
.micro-title {
    color: #8e8e93;
    font-size: 10px;
    margin-bottom: 4px;
}
.section-title {
    font-size: 14px;
    color: #ff9f0a;
    margin-top: 15px;
    margin-bottom: 5px;
    text-align: left;
    border-left: 3px solid #ff9f0a;
    padding-left: 8px;
}
.chart-svg { width: 100%; height: 65px; overflow: visible; }
.history-item {
    background: rgba(255,255,255,0.02);
    padding: 12px;
    border-radius: 14px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>
<body>

<div class="search-container">
    <input type="text" class="search-input" id="foodSearchInput" placeholder="輸入食物名稱 (例如: 絲襪奶茶)">
    <button class="search-btn" onclick="searchFoodText()">🔍 搜尋</button>
</div>

<div id="result" style="font-size: 13px; color: #ff9f0a; margin: 0 16px;"></div>

<div class="card" style="text-align: center;">
    <h3>🔥 今日熱量進度</h3>
    <div class="rings">
        <div>
            <div id="cal" style="font-size: 24px; font-weight: bold;">0</div>
            <div style="font-size: 10px; color: #8e8e93;">KCAL</div>
        </div>
    </div>
    
    <div class="section-title">核心大分子營養素</div>
    <div class="macro-grid">
        <div class="macro-box"><div>🥩 蛋白質</div><div id="protein">0g</div></div>
        <div class="macro-box"><div>🍞 碳水</div><div id="carbs">0g</div></div>
        <div class="macro-box"><div>🧈 脂肪</div><div id="fat">0g</div></div>
    </div>

    <div class="section-title">進階脂肪與糖分</div>
    <div class="macro-grid">
        <div class="macro-box" style="background: rgba(255,5b,74,0.05);"><div>🍟 飽和脂肪</div><div id="satfat">0g</div></div>
        <div class="macro-box" style="background: rgba(255,5b,74,0.05);"><div>🍿 反式脂肪</div><div id="transfat">0g</div></div>
        <div class="macro-box" style="background: rgba(255,149,0,0.05);"><div>🍳 膽固醇</div><div id="cholesterol">0mg</div></div>
    </div>
    <div class="macro-grid" style="grid-template-columns: repeat(2, 1fr); margin-top: 8px;">
        <div class="macro-box" style="background: rgba(255,45,85,0.05);"><div>🍬 糖分</div><div id="sugar">0g</div></div>
        <div class="macro-box" style="background: rgba(52,199,89,0.05);"><div>🥗 膳食纖維</div><div id="fiber">0g</div></div>
    </div>

    <div class="section-title">8 種關鍵微量元素</div>
    <div class="micro-grid">
        <div class="micro-box"><div class="micro-title">🦴 鈣 (Ca)</div><div id="ca">0mg</div></div>
        <div class="micro-box"><div class="micro-title">🧭 鐵 (Fe)</div><div id="fe">0mg</div></div>
        <div class="micro-box"><div class="micro-title">🔩 鎂 (Mg)</div><div id="mg">0mg</div></div>
        <div class="micro-box"><div class="micro-title">🧂 鈉 (Na)</div><div id="na">0mg</div></div>
    </div>
    <div class="micro-grid" style="margin-top: 8px;">
        <div class="micro-box"><div class="micro-title">🍌 鉀 (K)</div><div id="k">0mg</div></div>
        <div class="micro-box"><div class="micro-title">🛡️ 鋅 (Zn)</div><div id="zn">0mg</div></div>
        <div class="micro-box"><div class="micro-title">🍊 維他命C</div><div id="vitc">0mg</div></div>
        <div class="micro-box" style="opacity: 0.5;"><div class="micro-title">✨ 綜合</div><div>--</div></div>
    </div>
</div>

<div class="card">
    <h3>📈 本週卡路里動態趨勢</h3>
    <svg class="chart-svg" viewBox="0 0 300 60">
        <path id="chartPathLine" d="M 10 50 L 290 50" fill="none" stroke="#ff9f0a" stroke-width="3"/>
        <g id="chartGridX"></g>
    </svg>
</div>

<div class="card">
    <h3>📜 今日餐食記錄</h3>
    <div id="history">尚無數據</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyUUlD_-S7d22LnTjoFDtHSWkuwkTWFJsyjmLgoJKuX-6HXJSc2ECFO1p037E1qaTvX/exec";

// 擴充全域追蹤變數，包含微量元素與進階指標
let cal = 0, protein = 0, carbs = 0, fat = 0;
let satfat = 0, transfat = 0, cholesterol = 0, sugar = 0, fiber = 0;
let ca = 0, fe = 0, mg = 0, na = 0, k = 0, zn = 0, vitc = 0;

let weeklyData = [1400, 1500, 1350, 1600, 0]; // 預設週均趨勢數據

async function searchFoodText() {
    const query = document.getElementById("foodSearchInput").value.trim();
    if (!query) return;
    
    document.getElementById("result").innerHTML = "⏳ 正在搜尋雲端試算表資料庫...";
    
    try {
        let res = await fetch(API_URL);
        if (res.ok) {
            let resData = await res.json();
            let foodList = resData.nutrition_data || [];
            
            let targetItem = foodList.find(item => {
                let dbName = (item["Food Name"] || "").toString().toLowerCase();
                return dbName.includes(query.toLowerCase());
            });

            if (targetItem) {
                document.getElementById("result").innerHTML = "<span style='color:#30d158;'>✅ 成功抓取試算表數據！</span>";
                
                // 清洗物件屬性名稱，抹除空格、特殊符號與括號以確保對接成功
                let cleanItem = {};
                for (let key in targetItem) {
                    let cleanKey = key.toString().toLowerCase().replace(/[^a-z0-9]/g, "");
                    cleanItem[cleanKey] = targetItem[key];
                }
                
                // 讀取數據並進行嚴格的四捨五入優化處理
                let fCal = Math.round(parseFloat(cleanItem["calories"] || 0));
                let fP = Math.round(parseFloat(cleanItem["proteing"] || 0));
                let fC = Math.round(parseFloat(cleanItem["carbsg"] || 0));
                let fF = Math.round(parseFloat(cleanItem["fatg"] || 0));
                
                // 擴充進階與微量元素提取邏輯
                let fSatFat = Math.round(parseFloat(cleanItem["saturatedfatg"] || cleanItem["satfatg"] || 0));
                let fTransFat = Math.round(parseFloat(cleanItem["transfatg"] || 0));
                let fChol = Math.round(parseFloat(cleanItem["cholesterolmg"] || cleanItem["cholmg"] || 0));
                let fSugar = Math.round(parseFloat(cleanItem["sugarg"] || 0));
                let fFiber = Math.round(parseFloat(cleanItem["dietaryfiberg"] || cleanItem["fiberg"] || 0));
                
                let fCa = Math.round(parseFloat(cleanItem["calciummg"] || cleanItem["camg"] || 0));
                let fFe = Math.round(parseFloat(cleanItem["ironmg"] || cleanItem["femg"] || 0));
                let fMg = Math.round(parseFloat(cleanItem["magnesiummg"] || cleanItem["mgmg"] || 0));
                let fNa = Math.round(parseFloat(cleanItem["sodiummg"] || cleanItem["namg"] || 0));
                let fK = Math.round(parseFloat(cleanItem["potassiummg"] || cleanItem["kmg"] || 0));
                let fZn = Math.round(parseFloat(cleanItem["zincmg"] || cleanItem["znmg"] || 0));
                let fVitC = Math.round(parseFloat(cleanItem["vitamincmg"] || cleanItem["vitcmg"] || 0));

                // 數據累加
                cal += fCal;
                protein += fP;
                carbs += fC;
                fat += fF;
                satfat += fSatFat;
                transfat += fTransFat;
                cholesterol += fChol;
                sugar += fSugar;
                fiber += fFiber;
                ca += fCa;
                fe += fFe;
                mg += fMg;
                na += fNa;
                k += fK;
                zn += fZn;
                vitc += fVitC;

                // 1. 刷新主面板數據 (核心大分子)
                document.getElementById("cal").innerText = cal;
                document.getElementById("protein").innerText = protein + "g";
                document.getElementById("carbs").innerText = carbs + "g";
                document.getElementById("fat").innerText = fat + "g";
                
                // 刷新進階指標
                document.getElementById("satfat").innerText = satfat + "g";
                document.getElementById("transfat").innerText = transfat + "g";
                document.getElementById("cholesterol").innerText = cholesterol + "mg";
                document.getElementById("sugar").innerText = sugar + "g";
                document.getElementById("fiber").innerText = fiber + "g";

                // 刷新微量元素面板
                document.getElementById("ca").innerText = ca + "mg";
                document.getElementById("fe").innerText = fe + "mg";
                document.getElementById("mg").innerText = mg + "mg";
                document.getElementById("na").innerText = na + "mg";
                document.getElementById("k").innerText = k + "mg";
                document.getElementById("zn").innerText = zn + "mg";
                document.getElementById("vitc").innerText = vitc + "mg";

                // 2. 寫入今日餐食歷史紀錄
                let histBox = document.getElementById("history");
                if (histBox.innerText === "尚無數據") histBox.innerHTML = "";
                histBox.innerHTML += `<div class="history-item"><span>${targetItem["Food Name"]}</span><span style="color:#ff9f0a;">+${fCal} KCAL</span></div>`;
                
                // 3. 聯動更新折線趨勢圖
                weeklyData[weeklyData.length - 1] = cal;
                drawChart();
                
                document.getElementById("foodSearchInput").value = "";
            } else {
                document.getElementById("result").innerHTML = "";
                alert("在試算表中找不到包含「" + query + "」的食物，請檢查拼字！");
            }
        } else {
            alert("後端伺服器回應異常，請確認 Apps Script 已成功發布為 Anyone 權限。");
        }
    } catch (err) {
        alert("搜尋失敗，錯誤原因: " + err.toString());
    }
}

function drawChart() {
    let stepX = 260 / (weeklyData.length - 1);
    let pts = [];
    let txt = "";
    
    weeklyData.forEach((val, idx) => {
        let x = 20 + idx * stepX;
        let y = 50 - (val / 2500 * 40);
        pts.push(`${x},${y}`);
        txt += `<text x="${x}" y="58" fill="#8e8e93" font-size="8" text-anchor="middle">${20+idx}/6</text>`;
    });
    document.getElementById("chartPathLine").setAttribute("d", "M " + pts.join(" L "));
    document.getElementById("chartGridX").innerHTML = txt;
}

window.onload = function() {
    drawChart();
};
</script>
</body>
</html>
