<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVR 射籃修正優化版</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-super-hands-component@master/dist/aframe-super-hands.min.js"></script>
    
    <script>
        // 【自定義投籃補償組件】
        AFRAME.registerComponent('throw-compensate', {
            init: function () {
                let el = this.el; // 呢個係籃球
                
                // 監聽放手事件 (當玩家放開手勢或手把掣)
                el.addEventListener('grab-end', (evt) => {
                    console.log("偵測到放手，觸發射波推力補償！");
                    
                    // 獲取玩家頭顯(相機)面向嘅方向，作為射波方向
                    let camera = document.querySelector('[camera]');
                    let direction = new THREE.Vector3();
                    camera.object3D.getWorldDirection(direction);
                    
                    // THREE.js 的方向向量相反，需要取反面
                    direction.multiplyScalar(-1); 
                    
                    // 設定射波力道 (向前推 75%, 向上提升 25%)
                    let throwForce = 8.5; // 你可以調整呢個數值去改變射程
                    let impulse = new THREE.Vector3(
                        direction.x * throwForce,
                        (direction.y + 0.4) * throwForce * 1.2, // 微調向上帝視角弧度
                        direction.z * throwForce
                    );
                    
                    // 等待一個 frame 讓 super-hands 解除剛體綁定，然後施加衝量
                    setTimeout(() => {
                        if (el.body) {
                            // 清空球體本來的靜止速度
                            el.body.velocity.set(0, 0, 0);
                            el.body.angularVelocity.set(0, 0, 0);
                            // 施加推力
                            el.body.applyImpulse(
                                new CANNON.Vec3(impulse.x, impulse.y, impulse.z),
                                el.body.position
                            );
                            console.log("推力已施加:", impulse);
                        }
                    }, 50);
                });
            }
        });

        // 語音生成球體腳本（同樣會自動掛載射波補償）
        AFRAME.registerComponent('voice-spawner', {
            init: function () {
                const sceneEl = this.el;
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;

                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.lang = 'zh-HK';
                
                recognition.onresult = (event) => {
                    const text = event.results[event.resultIndex][0].transcript.trim().toLowerCase();
                    if (text.includes('波') || text.includes('ball')) {
                        let ball = document.createElement('a-sphere');
                        ball.setAttribute('color', '#FF6600');
                        ball.setAttribute('radius', '0.24');
                        ball.setAttribute('position', '0 1.5 -0.6'); // 生成在伸手可及的近距離
                        ball.setAttribute('dynamic-body', 'mass: 1; restitution: 0.85; friction: 0.2');
                        ball.setAttribute('grabbable', 'physicsBodyActivation: listen');
                        ball.setAttribute('throw-compensate', ''); // 注入補償
                        sceneEl.appendChild(ball);
                    }
                };
                recognition.onend = () => recognition.start();
                window.addEventListener('click', () => { recognition.start(); }, { once: true });
            }
        });
    </script>
</head>
<body>

    <a-scene physics="debug: false; gravity: -9.8" voice-spawner>
        <a-sky color="#B0E0E6"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#D2691E" static-body></a-plane>

        <a-cylinder position="0 2 -4" radius="0.1" height="4" color="#7F8C8D" static-body></a-cylinder>
        <a-box position="0 4 -3.4" width="2.4" height="1.6" depth="0.08" color="#FFFFFF" static-body></a-box>
        <a-torus position="0 3.25 -2.7" rotation="90 0 0" radius="0.38" tube="0.04" color="#FF4500" static-body></a-torus>

        <a-sphere id="basketball" position="0 1.2 -0.6" radius="0.24" color="#FF6600"
                  grabbable="physicsBodyActivation: listen"
                  throw-compensate
                  dynamic-body="mass: 1; restitution: 0.85; friction: 0.2">
        </a-sphere>

        <a-entity id="rig">
            <a-camera position="0 1.6 0"></a-camera>
            
            <a-entity hand-controls="hand: left" hand-tracking-controls="hand: left"
                      sphere-collider="objects: [grabbable]"  
                      super-hands="colliderEvent: hitstart; colliderEventProperty: el;
                                   colliderEndEvent: hitend; colliderEndEventProperty: el">
            </a-entity>

            <a-entity hand-controls="hand: right" hand-tracking-controls="hand: right"
                      sphere-collider="objects: [grabbable]" 
                      super-hands="colliderEvent: hitstart; colliderEventProperty: el;
                                   colliderEndEvent: hitend; colliderEndEventProperty: el">
            </a-entity>
        </a-entity>
    </scene>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                background: rgba(0,0,0,0.85); color: white; padding: 15px 25px; border-radius: 25px; 
                font-family: sans-serif; text-align: center; font-size: 14px;">
        🏀 <b>射籃新玩法：</b><br>
        1. 伸出手捏合（Pinch）或撳掣攞起個波。<br>
        2. <b>望住個籃框</b>，做出投籃動作並<b>鬆開手勢/按鍵</b>！<br>
        3. 系統會自動捕捉你放手嗰刻你雙眼望住嘅方向，將個波完美射向籃框！
    </div>

</body>
</html>
